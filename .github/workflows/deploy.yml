name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run prisma:generate
      - run: npm run build
      - run: npm test -- --runInBand

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Configure SSH
        env:
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          printf '%s\n' "$VPS_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            ubuntu@43.134.32.200 'bash -se' <<'EOF'
          set -euo pipefail

          cd /home/ubuntu/projects/garuda-hacks-7/zhu-server
          git switch main
          git pull --ff-only origin main
          npm ci
          npm run prisma:generate
          docker compose -f docker-compose.yml -f docker-compose.production.yml up -d --wait
          npm run prisma:migrate:deploy
          npm run build
          sudo systemctl restart zhu-server
          sudo systemctl is-active --quiet zhu-server
          curl --fail --retry 10 --retry-connrefused --retry-delay 1 http://127.0.0.1:3001/api
          EOF
